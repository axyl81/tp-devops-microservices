name: Microservices CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # --- CONFIG SERVICE ---
      - name: Build Config Service
        run: cd config-service && mvn clean install
      - name: Docker Build Config Service
        run: cd config-service && docker build -t config-service:latest .

      # --- DISCOVERY SERVICE ---
      - name: Build Discovery Service
        run: cd discovery-service && mvn clean install
      - name: Docker Build Discovery Service
        run: cd discovery-service && docker build -t discovery-service:latest .

      # --- CATALOGUE SERVICE ---
      - name: Build Catalogue Service
        run: cd catalogue-service && mvn clean install
      - name: Docker Build Catalogue Service
        run: cd catalogue-service && docker build -t catalogue-service:latest .

      # --- COMMANDE SERVICE ---
      - name: Build Commande Service
        run: cd commande-service && mvn clean install
      - name: Docker Build Commande Service
        run: cd commande-service && docker build -t commande-service:latest .

      # --- PAIEMENT SERVICE ---
      - name: Build Paiement Service
        run: cd paiement-service && mvn clean install
      - name: Docker Build Paiement Service
        run: cd paiement-service && docker build -t paiement-service:latest .

      # --- GATEWAY SERVICE ---
      - name: Build Gateway Service
        run: cd gateway-service && mvn clean install
      - name: Docker Build Gateway Service
        run: cd gateway-service && docker build -t gateway-service:latest .