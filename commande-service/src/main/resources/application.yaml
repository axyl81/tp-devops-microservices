server:
  port: 8082

spring:
  application:
    name: commande-service

  config:
    import: "optional:configserver:"

  datasource:
    url: jdbc:h2:mem:commandedb
    driverClassName: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update